spring.application.name=RestaurantManagement

# ─── H2 In-Memory Database (development) ────────────────────────────────────
# TODO (Oracle migration): Replace this entire block with Oracle datasource config
spring.datasource.url=jdbc:h2:mem:rmmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
# TODO (Oracle migration): Change dialect to org.hibernate.dialect.OracleDialect
#                          and ddl-auto to update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ─── Google OAuth2 ───────────────────────────────────────────────────────────
# TODO: Replace YOUR_CLIENT_ID and YOUR_CLIENT_SECRET with real Google credentials
spring.security.oauth2.client.registration.google.client-id=YOUR_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
